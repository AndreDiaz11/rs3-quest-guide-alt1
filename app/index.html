<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Compass — Guía de Misiones RS3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <button id="sidebar-toggle" title="Mostrar/ocultar lista de misiones" aria-label="Mostrar/ocultar lista de misiones">&#9776;</button>
    <div id="sidebar-backdrop"></div>
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="header-logo"></span>
        <span id="app-title" class="app-title-font">Quest Compass</span>
        <button id="settings-btn" title="Ajustes" aria-label="Ajustes">&#9881;</button>
      </div>
      <div id="sidebar-filterbar-slot"></div>
      <ul id="quest-list"></ul>
      <div id="quest-counter">
        <span id="counter-logo"></span>
        <span id="counter-text"></span>
      </div>
    </aside>
    <main id="detail">
      <p id="detail-placeholder">Selecciona una misión.</p>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
